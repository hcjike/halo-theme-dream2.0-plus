name: Publish version

on:
  release:
    types:
      - published

permissions:
  id-token: write
  contents: read    # 读取仓库代码

jobs:

  # 非正式版执行时，不发布到商店
  cd:
    uses: hcjike/reusable-workflows/.github/workflows/theme-cd.yaml@v4
    secrets:
      halo-pat: ${{ secrets.HALO_PAT }}
    permissions:
      contents: write
    with:
      app-id: app-HrMpM
      skip-appstore-release: ${{ (github.event.release.prerelease || contains(github.event.release.tag_name, 'beta') || contains(github.event.release.tag_name, 'alpha')) }}

  # 若cd任务未执行、发布的版本是预览版、发布的标签名含有'beta'字样，则此任务也不执行
  npm-publish:
    permissions:
      id-token: write
      contents: read    # 读取仓库代码
    name: Npm Publish
    needs: cd
    if: |
      !github.event.release.prerelease && 
      !contains(github.event.release.tag_name, 'beta') && 
      !contains(github.event.release.tag_name, 'alpha')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Reinstall Node.js and npm (v24 with latest CLI)
        run: |
          sudo apt-get remove -y nodejs npm
          curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
          sudo apt-get install -y nodejs
          
          # 确保 npm 是最新版本
          sudo npm install -g npm@latest
          
          # 安装常用的 CLI 工具
          sudo npm install -g @angular/cli@latest
          sudo npm install -g @vue/cli@latest
          sudo npm install -g create-react-app
          
          # 验证版本
          node --version
          npm --version
          ng --version
          vue --version
          npx create-react-app --version

      - name: npm ci
        run: npm ci

      # 编译资源文件，用于上传到npm
      - name: Build
        run: npm run build-res --tag=${{ github.event.release.tag_name }}

      - name: npm publish
        run: npm publish --tag=latest
